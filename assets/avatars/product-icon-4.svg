<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img">
    <title>Flare avatar</title>
    <defs>
    <filter id="blur-1" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.1"/></filter>
    <filter id="blur-3" x="-55%" y="-55%" width="210%" height="210%"><feGaussianBlur stdDeviation="3.2"/></filter>
    <filter id="blur-5" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5.1"/></filter>
    <filter id="blur-8" x="-85%" y="-85%" width="270%" height="270%"><feGaussianBlur stdDeviation="8.4"/></filter><clipPath id="clip-pi4"><rect width="64" height="64" rx="32" fill="#ffffff"/></clipPath><radialGradient id="edge-pi4" gradientUnits="userSpaceOnUse" cx="32" cy="32" r="32"><stop offset="98.4375%" stop-color="#ffffff"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></radialGradient><mask id="edge-mask-pi4" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse" x="0" y="0" width="64" height="64" style="mask-type:alpha"><rect width="64" height="64" fill="url(#edge-pi4)"/></mask>
      <linearGradient id="cream-pi4" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fff0d9"/><stop offset="100%" stop-color="#fff7ee"/>
      </linearGradient>
      <linearGradient id="hot-pi4" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffbb61"/><stop offset="100%" stop-color="#ff3c75"/>
      </linearGradient></defs>

    <g mask="url(#edge-mask-pi4)"><g clip-path="url(#clip-pi4)">
    <g transform="translate(32.030 32.030) rotate(0.000)"><rect x="-32.030" y="-32.030" width="64.060" height="64.060" rx="16.270" fill="#8c2450" opacity="1.000"/></g>

    <g transform="translate(32 32) rotate(0)" opacity="0.42">
      <rect x="-30.830" y="-30.830" width="61.660" height="61.660" rx="15.070" fill="none" stroke="#ffffff" stroke-width="1.400" opacity="0.38" filter="url(#blur-1)"/>
      <rect x="-30.030" y="-30.030" width="60.060" height="60.060" rx="14.270" fill="none" stroke="#ffdfda" stroke-width="2.400" opacity="0.24" filter="url(#blur-3)"/>
      <rect x="-28.030" y="-28.030" width="56.060" height="56.060" rx="12.270" fill="none" stroke="#ffbe74" stroke-width="4.000" opacity="0.18" filter="url(#blur-5)"/>
    </g>
    <g transform="translate(32.030 34.320) rotate(0.000)"><rect x="-35.085" y="-37.370" width="70.170" height="74.740" rx="16.270" fill="#ff8971" opacity="1.000"/></g>

    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; -4,3; 3,-2; 0,0" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.33;0.66;1"/>
      <g transform="translate(32.166 31.464) rotate(0.050)">
        <rect x="-35.034" y="-32.469" width="70.069" height="64.937" rx="119.884" fill="url(#cream-pi4)" opacity="0.922" filter="url(#blur-5)">
          <animate attributeName="rx" values="119.884;100;135;119.884" dur="9s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 3,3; -2,-4; 0,0" dur="6.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.33;0.66;1"/>
      <g transform="translate(38.909 42.008) rotate(-0.166)">
        <rect x="-22.050" y="-22.009" width="44.099" height="44.018" rx="120.050" fill="url(#hot-pi4)" opacity="0.838" filter="url(#blur-8)">
          <animate attributeName="rx" values="120.050;95;140;120.050" dur="7.5s" repeatCount="indefinite"/>
